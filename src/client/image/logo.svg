<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 71" role="img" aria-label="CIRCE">
  <title>CIRCE — Connectome Integration &amp; Reasoning for C. elegans</title>
  <!-- Connectome glyph: a ring of neurons wired around and across (chords = chained connections) -->
  <g fill="none" stroke="#c3ccd6" stroke-width="1.4">
    <!-- ring (octagon) -->
    <polygon points="58,35.5 51.3,51.8 35,58.5 18.7,51.8 12,35.5 18.7,19.2 35,12.5 51.3,19.2" />
  </g>
  <g stroke="#4498ef" stroke-width="1.8" stroke-linecap="round">
    <!-- chords: multi-hop / chained connections -->
    <line x1="58" y1="35.5" x2="18.7" y2="51.8" />
    <line x1="35" y1="58.5" x2="35" y2="12.5" />
    <line x1="51.3" y1="51.8" x2="18.7" y2="19.2" />
  </g>
  <g fill="#34495e">
    <circle cx="58" cy="35.5" r="3.3" />
    <circle cx="51.3" cy="51.8" r="3.3" />
    <circle cx="35" cy="58.5" r="3.3" />
    <circle cx="18.7" cy="51.8" r="3.3" />
    <circle cx="12" cy="35.5" r="3.3" />
    <circle cx="18.7" cy="19.2" r="3.3" />
    <circle cx="35" cy="12.5" r="3.3" />
    <circle cx="51.3" cy="19.2" r="3.3" />
  </g>
  <circle cx="35" cy="35.5" r="3.6" fill="#4498ef" />
  <!-- Wordmark -->
  <text x="76" y="42" font-family="Helvetica, Arial, sans-serif" font-size="30"
        font-weight="700" letter-spacing="0.5" fill="#34495e">CIRCE</text>
  <text x="78" y="57" font-family="Helvetica, Arial, sans-serif" font-size="8.5"
        font-style="italic" letter-spacing="0.3" fill="#8a97a6">C. elegans connectome KG</text>
</svg>
